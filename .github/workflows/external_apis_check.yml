name: "External APIs check"

on:
  schedule:
    - cron: "0 0 * * 0"

jobs:
  keys_check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - run: npm ci

      - run: npm run test:response
